defaults:
  - _self_
  - agent: sb3

hydra:
  run:
    dir: "${outpath}/${agent_name}/${env_name}/seed_${seed}"
  sweep:
    dir: "${outpath}/${agent_name}/${env_name}/seed_${seed}"
  
seed: 0
training_steps: 1000
env_name: MarsRover
env_kwargs: {}
agent_kwargs: {}
eval_every_n_steps: 100
n_eval_episodes: 1
outpath: "results"
buffer_cls: SimpleBuffer
buffer_kwargs: {}
batch_size: 64
update_after_episode_end: true
